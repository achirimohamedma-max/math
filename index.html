<html lang="ar" dir="rtl">

<meta charset="UTF-8">
<title>جزيرة الأرقام الذهبية</title>

<!-- Firebase (compat version stable) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "maths-fcd2d.firebaseapp.com",
  projectId: "maths-fcd2d",
  storageBucket: "maths-fcd2d.appspot.com",
  messagingSenderId: "310354706176",
  appId: "1:310354706176:web:a3a4ceebe4f6e1b53333de5",
  measurementId: "G-JV36HY44ZB"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

console.log("Firebase ready ✅");


// 🎯 دالة حفظ النقاط
window.saveScore = async function(name, score) {
  try {
    await addDoc(collection(db, "scores"), {
      name: name,
      score: score,
      date: new Date()
    });
    alert("تم حفظ النتيجة 🎉");
  } catch (e) {
    console.error("خطأ:", e);
  }
}
  function enter=fonction() {
  let name = document.getElementById("name").value;
  let score = parseInt(document.getElementById("score").innerText);

  if (!name) {
    alert("دخل الاسم");
    return;
  }

  saveScore(name, score);
}
</script>
</script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:linear-gradient(#4facfe,#43e97b);text-align:center}
.screen{display:none;padding:20px}
.active{display:block}

button{padding:10px;border:none;border-radius:10px;background:orange;color:white;margin:5px}
input{padding:8px;margin:5px}

.cards{display:grid;grid-template-columns:repeat(2,120px);gap:10px;justify-content:center;margin-top:20px}
.card{height:120px;background:gold;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer}

.chartBox{background:white;padding:10px;border-radius:10px;margin:15px auto;width:90%;max-width:500px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active">
<h1>🏝️ جزيرة الأرقام الذهبية</h1>
<button onclick="role='student'">تلميذ</button>
<button onclick="role='teacher'">أستاذ</button><br>
<input id="name" placeholder="الاسم">
<input id="className" placeholder="القسم"><br>
<button onclick="enter()">دخول</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
<h2 style="color:white">
⭐ <span id="score">0</span> | ⏳ <span id="time">60</span>
</h2>

<div id="cards" class="cards"></div>

<div id="qbox" style="display:none">
<h2 id="question"></h2>
<input id="answer">
<button onclick="submit()">تأكيد</button>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">
<h2>📊 Dashboard الأستاذ</h2>

<div class="chartBox">
<canvas id="bar"></canvas>
</div>

<div class="chartBox">
<canvas id="pie"></canvas>
</div>

<button onclick="show('login')">رجوع</button>
</div>

<script>
// 🔥 ضع config هنا
const firebaseConfig = {
  apiKey: "  const firebaseConfig = {
    apiKey: "AIzaSyDM7LdmSOalh4ARB8k8NZsQvNgVG2zuNmA",
    authDomain: "maths-fcd2d.firebaseapp.com",
    projectId: "maths-fcd2d",
    storageBucket: "maths-fcd2d.firebasestorage.app",
    messagingSenderId: "310354706176",
    appId: "1:310354706176:web:a3a4ceebe4f6e1b5333de5",
    measurementId: "G-JV36HY44ZB"
  };",
  authDomain: "PUT",
  projectId: "PUT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// VARIABLES
let role="", player="", cls="";
let score=0,time=60,timer;
let correct=0, wrong=0;
let currentAnswer=null;

// UI
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// LOGIN
function enter(){
player=document.getElementById("name").value;
cls=document.getElementById("className").value;

if(!player || !cls) return alert("دخل الاسم والقسم");

if(role==="student") startGame();
else loadDashboard();
}

// GAME
function startGame(){
show("game");
score=0;time=60;correct=0;wrong=0;
generateCards();
update();

timer=setInterval(()=>{
time--;
update();
if(time<=0){clearInterval(timer);endGame();}
},1000);
}

function update(){
document.getElementById("score").innerText=score;
document.getElementById("time").innerText=time;
}

function generateCards(){
let c=document.getElementById("cards");
c.innerHTML="";
for(let i=0;i<4;i++){
let d=document.createElement("div");
d.className="card";
d.innerText="❓";
d.onclick=()=>ask();
c.appendChild(d);
}
}

function ask(){
let a=rand(1,20),b=rand(1,20);
currentAnswer=a+b;
document.getElementById("question").innerText=`${a} + ${b}`;
document.getElementById("qbox").style.display="block";
}

function submit(){
let v=document.getElementById("answer").value;

if(v==currentAnswer){
score+=10; correct++;
}else{
score-=3; wrong++;
}

document.getElementById("answer").value="";
document.getElementById("qbox").style.display="none";
generateCards();
update();
}

// SAVE SESSION (مرة وحدة)
async function endGame(){
await db.collection("results").add({
name:player,
class:cls,
score:score,
correct:correct,
wrong:wrong,
date:new Date()
});

alert("تم حفظ النتيجة");
show("login");
}

// DASHBOARD
async function loadDashboard(){
show("dashboard");

let snap = await db.collection("results").get();

let scores={}, totalCorrect=0,totalWrong=0;

snap.forEach(doc=>{
let d=doc.data();

scores[d.name]=(scores[d.name]||0)+d.score;
totalCorrect+=d.correct;
totalWrong+=d.wrong;
});

// BAR
new Chart(document.getElementById("bar"),{
type:'bar',
data:{
labels:Object.keys(scores),
datasets:[{label:'النقاط',data:Object.values(scores)}]
}
});

// PIE
new Chart(document.getElementById("pie"),{
type:'pie',
data:{
labels:["صحيح","خطأ"],
datasets:[{data:[totalCorrect,totalWrong]}]
}
});
}

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}
</script>

</body>
</html>
