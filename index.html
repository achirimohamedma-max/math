<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>جزيرة الأرقام الذهبية</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;margin:0;background:linear-gradient(#4facfe,#43e97b);text-align:center}
.screen{display:none;padding:20px}
.active{display:block}
button{padding:10px;background:orange;border:none;border-radius:10px;color:white;margin:5px}
input{padding:8px;margin:5px}

.cards{display:grid;grid-template-columns:repeat(2,130px);gap:10px;justify-content:center}
.card{height:130px;background:gold;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer}

.chartBox{width:90%;max-width:500px;margin:auto;background:white;padding:10px;border-radius:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active">
<h1>🏝️ جزيرة الأرقام الذهبية</h1>
<button onclick="setRole('student')">تلميذ</button>
<button onclick="setRole('teacher')">أستاذ</button><br>
<input id="name" placeholder="الاسم">
<input id="class" placeholder="القسم">
<br>
<button onclick="enter()">دخول</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
<h2 style="color:white">⭐ <span id="score">0</span> | ⏳ <span id="time">60</span></h2>
<div id="cards" class="cards"></div>

<div id="qbox" style="display:none">
<h2 id="q"></h2>
<input id="ans">
<button onclick="submit()">تأكيد</button>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">
<h2>📊 Dashboard الأستاذ</h2>

<div class="chartBox">
<canvas id="barChart"></canvas>
</div>

<br>

<div class="chartBox">
<canvas id="pieChart"></canvas>
</div>

<button onclick="back()">رجوع</button>
</div>

<script>
// 🔴 ضع config ديالك هنا
const firebaseConfig = {
  apiKey: "PUT_HERE",
  authDomain: "PUT_HERE",
  projectId: "PUT_HERE"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let role="",player="",cls="";
let score=0,time=60,timer,currentAnswer=null;

// LOGIN
function setRole(r){role=r}

function enter(){
player=name.value; cls=class.value;

if(role==="student") startGame();
else loadDashboard();
}

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// GAME
function startGame(){
show("game");
score=0; time=60;
generateCards();

timer=setInterval(()=>{
time--; update();
if(time<=0){clearInterval(timer);endGame();}
},1000);
}

function update(){
scoreEl.innerText=score;
timeEl.innerText=time;
}

function generateCards(){
cards.innerHTML="";
for(let i=0;i<4;i++){
let d=document.createElement("div");
d.className="card";
d.innerText="❓";
d.onclick=()=>question();
cards.appendChild(d);
}
}

function question(){
let a=rand(1,20),b=rand(1,20);
currentAnswer=a+b;
q.innerText=`${a}+${b}`;
qbox.style.display="block";
}

function submit(){
if(ans.value==currentAnswer){score+=10;save(true)}
else{score-=3;save(false)}

ans.value=""; qbox.style.display="none";
generateCards(); update();
}

// FIREBASE SAVE
async function save(correct){
await db.collection("students").add({
name:player,
class:cls,
correct:correct?1:0,
wrong:correct?0:1,
score:score,
date:Date.now()
});
}

function endGame(){
show("login");
}

// DASHBOARD
async function loadDashboard(){
show("dashboard");

const snapshot = await db.collection("students").get();

let scores={},correct=0,wrong=0;

snapshot.forEach(doc=>{
let d=doc.data();
scores[d.name]=(scores[d.name]||0)+d.score;
correct+=d.correct;
wrong+=d.wrong;
});

// BAR CHART
new Chart(barChart,{
type:'bar',
data:{
labels:Object.keys(scores),
datasets:[{label:'النقاط',data:Object.values(scores)}]
}
});

// PIE CHART
new Chart(pieChart,{
type:'pie',
data:{
labels:["صحيح","خطأ"],
datasets:[{data:[correct,wrong]}]
}
});
}

function back(){show("login")}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}
</script>

</body>
</html>
